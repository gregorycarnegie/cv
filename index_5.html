<style>
  :root{
    --bg:#0c0d10;
    --bg-2:#14161b;
    --fg:#dcd6c7;
    --muted:#6b7280;
    --amber:#ffb454;
    --green:#a6e22e;

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}

    overflow-x:hidden;
  }
  a{color:var(--cyan)}
  a:hover{color:var(--amber)}
  ::selection{background:var(--amber);color:#000}

  /* subtle CRT-ish scanlines */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:100;opacity:.04;
    background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,#000 2px,#000 3px);
  }
  /* vignette */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5));
  }

  /* TOP BAR */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:var(--bg-2);border-bottom:1px solid var(--line);
    padding:10px 20px;display:flex;align-items:center;gap:14px;
  }
  .topbar .dots{display:flex;gap:8px}
  .topbar .dot{width:12px;height:12px;border-radius:50%;background:#3a3f47}

  .topbar .title{font-size:12px;color:var(--muted);letter-spacing:.05em;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .topbar .tabs{display:flex;gap:4px}

  @media(max-width:680px){.topbar .tabs{display:none}}

  /* TERMINAL */
  .terminal{
    padding:28px 28px 24px;
    min-height:calc(100vh - 46px);
    display:flex;flex-direction:column;
  }
  .term-body{flex:1;overflow-y:auto}
  @media(max-width:680px){.terminal{padding:18px}}

  .line{white-space:pre-wrap;word-wrap:break-word}
  .muted{color:var(--muted)}
  .amber{color:var(--amber)}
  .green{color:var(--green)}
  .cyan{color:var(--cyan)}
  .pink{color:var(--pink)}
  .purple{color:var(--purple)}
  .bold{font-weight:600;color:var(--fg)}
  .dim{opacity:.65}

  .prompt{display:flex;align-items:baseline;gap:10px;margin-top:10px}
  .prompt .user{color:var(--green)}
  .prompt .host{color:var(--cyan)}
  .prompt .path{color:var(--purple)}
  .prompt .sep{color:var(--muted)}
  .prompt .arrow{color:var(--amber)}
  .prompt input{
    flex:1;background:transparent;border:0;outline:0;color:var(--fg);
    font:inherit;caret-color:var(--amber);padding:2px 0;
  }
  .prompt-line{margin-top:4px;margin-bottom:10px}

  .cursor{display:inline-block;width:9px;height:16px;background:var(--amber);vertical-align:-3px;animation:blink 1s steps(2,start) infinite;margin-left:2px}
  @keyframes blink{to{visibility:hidden}}

  /* result blocks */
  .block{margin:8px 0 16px;padding-left:14px;border-left:2px solid var(--line)}
  .block h3{font-family:"IBM Plex Sans",sans-serif;font-weight:600;font-size:22px;color:var(--amber);margin-bottom:8px;letter-spacing:-.01em}
  .block h4{font-family:"IBM Plex Sans",sans-serif;font-weight:600;font-size:16px;color:var(--fg);margin-top:12px;margin-bottom:4px}
  .block p{margin:4px 0;color:#c4bdac}
  .block ul{list-style:none;margin:8px 0 8px 0}
  .block ul li{padding:3px 0;padding-left:20px;position:relative;color:#c4bdac}
  .block ul li::before{content:"▸";position:absolute;left:0;color:var(--green)}

  .kv{display:grid;grid-template-columns:160px 1fr;gap:8px 20px;margin:10px 0}
  .kv dt{color:var(--muted);font-size:13px}
  .kv dd{color:var(--fg)}
  @media(max-width:560px){.kv{grid-template-columns:1fr;gap:2px 0}.kv dt{margin-top:8px}}

  /* ASCII header */
  .ascii{white-space:pre;color:var(--amber);font-size:12px;line-height:1.1;margin:8px 0 16px;opacity:.95}
  @media(max-width:680px){.ascii{font-size:9px}}

  /* command list */

  .cmds dt{color:var(--cyan);font-weight:500}
  .cmds dd{color:#c4bdac}

  /* table-ish projects */
  .plist{display:grid;gap:6px;margin:10px 0}
  .plist .row{display:grid;grid-template-columns:20px 220px 1fr 140px;gap:16px;padding:10px 0;border-bottom:1px dashed var(--line);align-items:baseline}
  .plist .row:hover{background:rgba(255,180,84,.05)}

  .plist .row .name{color:var(--amber);font-weight:600}
  .plist .row .desc{color:#c4bdac;font-size:13px}
  .plist .row .tags{color:var(--cyan);font-size:12px;text-align:right}
  @media(max-width:820px){
    .plist .row{grid-template-columns:1fr;gap:2px;padding:12px 0}
    .plist .row .tags{text-align:left}
  }

  /* hint bar */
  .hint{
    padding:12px 20px;border-top:1px solid var(--line);background:var(--bg-2);
    font-size:11px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
    position:sticky;bottom:0;z-index:40;
  }
  .hint .kbd{display:inline-block;padding:1px 6px;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--fg);margin:0 2px;font-size:10px}

  /* quick buttons */
  .quickbar{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 0}
  .quickbar button{
    background:var(--bg-2);border:1px solid var(--line);color:var(--fg);

  }
  .quickbar button:hover{border-color:var(--amber);color:var(--amber)}
  .quickbar button::before{content:"› ";color:var(--green)}

const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function write(html){

const alias={"ls":"help","?":"help","h":"help","cv":"experience","resume":"experience","me":"about","work":"projects"};

function run(raw){
  const cmd=(raw||"").trim();
  if(!cmd)return;
  echoPrompt(cmd);
  history.unshift(cmd);hIdx=-1;
  const parts=cmd.split(/\s+/);
  let name=parts[0].toLowerCase();
  if(alias[name])name=alias[name];

  if(name==="clear"){body.innerHTML="";return}
  if(name==="sudo"){write(commands.sudo());return}
  if(name.startsWith("rm"))return write(`<span class="pink">rm: permission denied</span> <span class="muted">(nice try)</span>`);

  const fn=commands[name];
  if(fn){write(fn(parts.slice(1)));scrollDown();}
  else write(`<span class="pink">command not found:</span> ${esc(parts[0])}. Try <span class="amber">help</span>.`);
}

// ---- BOOT SEQUENCE ----
function bootLine(text,cls=""){
  return new Promise(r=>{
    const d=document.createElement("div");d.className="line "+cls;body.appendChild(d);
    let i=0;
    const iv=setInterval(()=>{
      d.innerHTML=text.slice(0,++i);
      if(i>=text.length){clearInterval(iv);r()}
      scrollDown();
    },8);
  });
}
async function boot(){
  await bootLine(`<span class="muted">Last login: Fri Apr 24 09:14:22 on ttys002</span>`);
  await bootLine(`<span class="muted">booting carnegie@portfolio v2.6.0 ...</span>`);
  await bootLine(`<span class="green">✓</span> identity verified — gregory@carnegie`);
  await bootLine(`<span class="green">✓</span> rust toolchain · <span class="green">✓</span> gpu drivers · <span class="green">✓</span> coffee`);
  await new Promise(r=>setTimeout(r,220));
  write(`
<pre class="ascii">${ASCII}</pre>
<div class="line"><span class="amber bold">Welcome.</span> This is an interactive CV. Type <span class="amber">help</span> to get started, or use the buttons below.</div>
<div class="line muted">Loaded · Rust · Python · PowerShell · wgpu · Axum · Polars · Maud · MCP · Entra ID · SCCM · Intune · Three.js · and too much else to list.</div>
`);
  await new Promise(r=>setTimeout(r,400));
  run("whoami");
  await new Promise(r=>setTimeout(r,220));
  run("neofetch");
  input.focus();
}

// ---- INPUT HANDLING ----
form.addEventListener("submit",e=>{
  e.preventDefault();
  run(input.value);
  input.value="";
});
input.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"){
    if(history.length){hIdx=Math.min(history.length-1,hIdx+1);input.value=history[hIdx]||"";setTimeout(()=>input.setSelectionRange(input.value.length,input.value.length),0);e.preventDefault()}
  }
  else if(e.key==="ArrowDown"){
    if(hIdx>0){hIdx--;input.value=history[hIdx]||""}
    else{hIdx=-1;input.value=""}
    e.preventDefault();
  }
  else if(e.key==="Tab"){
    e.preventDefault();
    const q=input.value.trim().toLowerCase();
    if(!q)return;
    const all=Object.keys(commands).concat(Object.keys(alias));
    const match=all.filter(k=>k.startsWith(q));
    if(match.length===1)input.value=match[0];
    else if(match.length>1)write(`<span class="muted">${match.join("  ")}</span>`);
  }
  else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="l"){
    e.preventDefault();body.innerHTML="";
  }
});

// ---- QUICK BUTTONS ----
document.querySelectorAll(".quickbar button").forEach(b=>{
  b.addEventListener("click",()=>{run(b.dataset.cmd);input.focus();});
});

// keep focus on input
document.addEventListener("click",e=>{
  if(e.target.tagName==="A"||e.target.tagName==="BUTTON")return;
  if(!window.getSelection().toString())input.focus();
});

boot();
</script>
</body>
</html>
